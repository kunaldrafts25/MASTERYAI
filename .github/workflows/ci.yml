name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: masteryai
          POSTGRES_PASSWORD: masteryai_test
          POSTGRES_DB: masteryai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U masteryai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (unit only, no live LLM)
        env:
          DATABASE_URL: postgresql://masteryai:masteryai_test@localhost:5432/masteryai
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
          AWS_REGION: us-east-1
          AWS_BEDROCK_MODEL_ID: us.anthropic.claude-3-5-haiku-20241022-v1:0
        run: pytest tests/ -m "not live" -v --tb=short --ignore=tests/integration_test.py

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
        run: npm run build
